<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><title>Catallogic - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-[#F8FAFC] font-inter min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-xl shadow-md border border-gray-100 w-full max-w-md">
        <div class="flex flex-col items-center mb-6">
            <div class="w-12 h-12 bg-[#0EA5E9] rounded-xl flex items-center justify-center font-bold text-white text-xl mb-2">C</div>
            <h1 class="text-2xl font-bold text-[#1E293B]">Acessar Catallogic</h1>
        </div>
        <form onsubmit="event.preventDefault(); window.location.href='index.html';" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">E-mail</label>
                <input type="email" required class="w-full px-3 py-2 bg-slate-50 border border-gray-200 rounded-lg focus:outline-none focus:border-[#0EA5E9]">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Senha</label>
                <input type="password" required class="w-full px-3 py-2 bg-slate-50 border border-gray-200 rounded-lg focus:outline-none focus:border-[#0EA5E9]">
            </div>
            <button type="submit" class="w-full bg-[#0EA5E9] hover:bg-sky-600 text-white font-semibold py-2.5 rounded-lg shadow-sm transition">
                Entrar no Painel
            </button>
        </form>
        <p class="text-center text-sm text-gray-500 mt-4">Não tem uma conta? <a href="cadastro.html" class="text-[#0EA5E9] hover:underline">Cadastre-se</a></p>
    </div>
</body>
</html>
